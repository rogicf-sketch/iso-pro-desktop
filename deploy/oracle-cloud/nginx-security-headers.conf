# Security headers — incluir no bloco `server` HTTP e no bloco HTTPS gerado pelo Certbot.
# Após editar: sudo nginx -t && sudo systemctl reload nginx

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# SPA Vite + Supabase + OpenAI (relatório IA no browser)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://*.sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

# Só no bloco HTTPS (443) — descomente após Certbot:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
