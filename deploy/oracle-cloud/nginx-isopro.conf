# I.S.O PRO — site estático na Oracle Cloud (Ubuntu + Nginx).
# 1) Copiar conteúdo de `dist/` para /var/www/iso-pro (ver instrucoes.txt).
# 2) sudo cp nginx-isopro.conf /etc/nginx/sites-available/isopro
# 3) sudo ln -sf /etc/nginx/sites-available/isopro /etc/nginx/sites-enabled/
# 4) sudo nginx -t && sudo systemctl reload nginx
# 5) sudo certbot --nginx -d isoprogestaodemateriais.com.br -d www.isoprogestaodemateriais.com.br

server {
    listen 80;
    listen [::]:80;
    server_name isoprogestaodemateriais.com.br www.isoprogestaodemateriais.com.br;

    root /var/www/iso-pro;
    index index.html;

    # Cabeçalhos de segurança (copie também para o bloco HTTPS do Certbot)
    include /etc/nginx/snippets/isopro-security-headers.conf;

    # Sem listagem de pastas
    autoindex off;

    # Ficheiros estáticos do Vite
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA (HashRouter: o servidor quase sempre serve / ; try_files cobre refrescos em /)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
