# https://www.electron.build/configuration/configuration
#
# EULA no instalador NSIS: texto mostrado antes da instalação (obrigatório aceitar).
# Substitua legal/EULA.txt pelo documento final aprovado pelo advogado antes de distribuir.
#
# Assinatura Windows (SmartScreen / Authenticode), opcional:
#   Definir antes de `npm run dist:win:signed` ou no CI:
#   - CSC_LINK ou WIN_CSC_LINK — caminho para .pfx (ou URL, ver documentação)
#   - CSC_KEY_PASSWORD ou WIN_CSC_KEY_PASSWORD — palavra-passe do certificado
#   GitHub Actions (repo secrets): WINDOWS_PFX_BASE64 (.pfx em base64) + WINDOWS_CERTIFICATE_PASSWORD.
#   O workflow .github/workflows/build-windows.yml escreve o PFX e corre dist:win:signed se ambos existirem.
#   Com certificado, podes usar dist:win:signed (signAndEditExecutable: true). Em PCs sem symlinks
#   / Developer Mode, builds não assinados usam dist:win (signAndEditExecutable: false).
#
# NSIS (makensis) costuma falhar com caminhos do projeto fora de ASCII (ex.: "GESTÃO").
# Para gerar só o .exe portátil (ícone igual, sem wizard): `npm run dist:win:portable`
# Para Setup completo: pasta do projeto só ASCII ou `subst I: "<pasta>"` e build em I:\
appId: com.isopro.desktop
productName: I.S.O PRO
copyright: Copyright © 2026 I.S.O PRO Gestão de Materiais

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

asar: true

# Ícone em runtime para BrowserWindow (fora do asar — ver `electron/main/window.ts`).
extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: scripts/export-iso-pro-snapshot.mjs
    to: backup-scripts/export-iso-pro-snapshot.mjs
  - from: scripts/upload-backup-to-oci-node.mjs
    to: backup-scripts/upload-backup-to-oci-node.mjs
  - from: scripts/loadEnvFile.mjs
    to: backup-scripts/loadEnvFile.mjs
  - from: scripts/ociObjectStorageSign.mjs
    to: backup-scripts/ociObjectStorageSign.mjs

win:
  # Evita download/extração do winCodeSign quando não há assinatura (útil em Windows sem symlinks / Developer Mode).
  signAndEditExecutable: false
  # Nome do .exe só ASCII — evita problemas de ícone / atalho com "I.S.O PRO.exe" e alinha com o AppUserModelID.
  executableName: iso-pro-desktop
  target:
    - nsis
    - portable
  # Ícone do .exe / atalho: gerado por `npm run build:icon` (png2icons, modo executável Windows).
  icon: build/icon.ico

nsis:
  license: legal/EULA.txt
  include: scripts/nsis/installer.nsh
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # Ícone da janela do instalador; cabeçalho do assistente = BMP 150×57 (installerHeader), não ico quadrado.
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeader: build/installerHeader.bmp

portable:
  artifactName: '${productName}-${version}-portable.exe'
