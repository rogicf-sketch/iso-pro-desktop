<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=iso-pro-brand-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I.S.O PRO — Gestão de materiais</title>
  </head>
  <body>
    <script>
      (function () {
        var tema = 'neon';
        try {
          var raw = localStorage.getItem('iso-pro-desktop-configuracoes-sistema');
          if (raw) {
            var p = JSON.parse(raw);
            if (p && typeof p.tema === 'string' && /^(padrao|escuro|claro|verde|neon)$/.test(p.tema)) {
              tema = p.tema;
            }
          }
        } catch (e) {
          /* fallback: neon (mesmo default que configuracoes.service) */
        }
        document.body.className = 'theme-' + tema;
      })();
    </script>
    <div id="root" data-e2e="app-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
