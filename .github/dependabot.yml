# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# labels: substitui o conjunto automático — lista explícita para triagem (filtros, projetos).
# PRs só de segurança (alerts) podem receber também "security" pelo GitHub, além disto.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
      - chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - chore
